<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console Guide</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
color:white;
text-align:center;

background-image:url("logo4.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

h1{
margin-top:40px;
}

.container{
margin-top:60px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo-card{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:25px;
margin:30px;
cursor:pointer;
transition:0.3s;
box-shadow:0 15px 35px rgba(0,0,0,0.5);
}

.logo-card img{
width:340px;
max-width:90%;
display:block;
}

.logo-card:hover{
transform:scale(1.07);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
overflow:auto;
}

.modal-content{
background:white;
color:black;
width:90%;
max-width:700px;
margin:50px auto;
padding:25px;
border-radius:15px;
text-align:left;
}

.modal-content img{
width:100%;
margin:15px 0;
border-radius:10px;
}

.close{
float:right;
cursor:pointer;
font-weight:bold;
font-size:20px;
}
</style>
</head>

<body>

<h1>Console Navigation Guide</h1>

<div class="container">

<div class="logo-card" onclick="openModal('dsi')">
<img src="logosn/logo1.jpg">
</div>

<div class="logo-card" onclick="openModal('3ds')">
<img src="logosn/logo2.jpg">
</div>

<div class="logo-card" onclick="openModal('wii')">
<img src="logosn/logo3.jpg">
</div>

</div>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<div id="modal-text"></div>
</div>
</div>

<script>
function openModal(type){

let text="";

if(type==="dsi"){
text=`<h2>Nintendo DSi Instructions</h2>

<h3>Play DSi Games</h3>

<h4>Step 1</h4>
<p>Power on your DSi and wait until the system finishes loading.</p>
<img src="stepsdsi/stepsndsi1.jpg">

<h4>Step 2</h4>
<p>Go to the <strong>roms</strong> folder.</p>
<img src="stepsdsi/stepsndsi2.jpg">

<h4>Step 3</h4>
<p>Select a game and start playing.</p>
<img src="stepsdsi/stepsndsi3.jpg">

<h4>Step 4</h4>
<p>Press the Power button once to return to the menu.</p>
<img src="stepsdsi/stepsndsi4.jpg">

<h4>Step 5</h4>
<p>Select another game.</p>
<img src="stepsdsi/stepsndsi5.jpg">

<hr>

<h3>Play GBA Games</h3>

<img src="stepsdsi/stepsndsi6.jpg">
<img src="stepsdsi/stepsndsi7.jpg">
<img src="stepsdsi/stepsndsi8.jpg">
<img src="stepsdsi/stepsndsi9.jpg">
<img src="stepsdsi/stepsndsi10.jpg">
<img src="stepsdsi/stepsndsi11.jpg">
<img src="stepsdsi/stepsndsi12.jpg">

<hr>

<h3>Play Original DS Cartridge</h3>

<img src="stepsdsi/stepsndsi13.jpg">
<img src="stepsdsi/stepsndsi14.jpg">
<img src="stepsdsi/stepsndsi15.jpg">
`;
}

if(type==="wii"){
text=`<h2>Wii Instructions</h2>

<h3>Play Games from USB</h3>

<h4>Step 1</h4>
<p>Turn on the Wii and press A.</p>
<img src="stepswii/wii1.jpg">

<p>Select Configurable USB Loader.</p>
<img src="stepswii/wii2.jpg">

<h4>Step 2</h4>
<p>Wait until games load.</p>
<img src="stepswii/wii3.jpg">

<h4>Step 3</h4>
<p>Select a game and press Start.</p>
<img src="stepswii/wii4.jpg">

<p>Enjoy your game.</p>
<img src="stepswii/wii5.jpg">

<h4>Change Game</h4>

<img src="stepswii/wii6.jpg">
<img src="stepswii/wii7.jpg">
<img src="stepswii/wii8.jpg">

<hr>

<h3>If USB Loader does not load</h3>

<img src="stepswii/wii9.jpg">
<img src="stepswii/wii10.jpg">
<img src="stepswii/wii11.jpg">
<img src="stepswii/wii12.jpg">

<hr>

<h3>Warning</h3>

<p>Do not remove USB or SD card.</p>

<img src="stepswii/wii13.jpg">
<img src="stepswii/wii14.jpg">

<p>USB must be connected in the correct port.</p>

<img src="stepswii/wii15.jpg">
`;
}

if(type==="3ds"){
text=`<h2>Nintendo 3DS Instructions</h2>

<h3>Delete Games using FBI</h3>

<h4>Step 1</h4>
<p>Open the FBI app.</p>
<img src="steps3ds/3ds1.jpg">
<img src="steps3ds/3ds2.jpg">

<h4>Step 2</h4>
<p>Select Titles.</p>
<img src="steps3ds/3ds3.jpg">

<h4>Step 3</h4>
<p>Select the game and choose Delete Title and Ticket.</p>
<img src="steps3ds/3ds4.jpg">
<img src="steps3ds/3ds5.jpg">

<hr>

<h3>Internet Connection</h3>

<h4>Step 1</h4>
<p>Open System Settings.</p>
<img src="steps3ds/3ds6.jpg">

<h4>Step 2</h4>
<p>Select Internet Settings.</p>
<img src="steps3ds/3ds7.jpg">

<h4>Step 3</h4>
<p>Select Connection Settings and create a new connection.</p>
<img src="steps3ds/3ds8.jpg">
<img src="steps3ds/3ds9.jpg">

<hr>

<h3>Download Games using HShop</h3>

<h4>Step 1</h4>
<p>Open HShop.</p>
<img src="steps3ds/3ds10.jpg">

<h4>Step 2</h4>
<p>Select category.</p>
<img src="steps3ds/3ds11.jpg">

<h4>Step 3</h4>
<p>Select region. Any region had games and you can download and plays as well</p>
<img src="steps3ds/3ds12.jpg">

<h4>Step 4</h4>
<p>Select the game and download.</p>
<img src="steps3ds/3ds13.jpg">
<img src="steps3ds/3ds14.jpg">

<p>Wait until download finishes.</p>
<img src="steps3ds/3ds15.jpg">

<hr>

<h3>Install Themes with ANEMONE</h3>

<h4>Step 1</h4>
<p>Open ANEMONE.</p>
<img src="steps3ds/3ds16.jpg">

<h4>Step 2</h4>
<p>Search Theme Plaza.</p>
<img src="steps3ds/3ds17.jpg">
<img src="steps3ds/3ds18.jpg">

<h4>Step 3</h4>
<p>Scan QR code.</p>
<img src="steps3ds/3ds19.jpg">
<img src="steps3ds/3ds20.jpg">

<p>Install the theme.</p>
<img src="steps3ds/3ds21.jpg">
<img src="steps3ds/3ds22.jpg">

<p>Restart console.</p>
<img src="steps3ds/3ds23.jpg">
`;
}

document.getElementById("modal-text").innerHTML=text;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
