<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console Guide</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
color:white;
text-align:center;

background-image:url("logo4.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

h1{
margin-top:40px;
}

.container{
margin-top:60px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo-card{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:25px;
margin:30px;
cursor:pointer;
transition:0.3s;
box-shadow:0 15px 35px rgba(0,0,0,0.5);
}

.logo-card img{
width:340px;
max-width:90%;
display:block;
}

.logo-card:hover{
transform:scale(1.07);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
overflow:auto;
}

.modal-content{
background:white;
color:black;
width:90%;
max-width:700px;
margin:50px auto;
padding:25px;
border-radius:15px;
text-align:left;
}

.modal-content img{
width:100%;
margin:15px 0;
border-radius:10px;
}

.close{
float:right;
cursor:pointer;
font-weight:bold;
font-size:20px;
}
</style>
</head>

<body>

<h1>Console Navigation Guide</h1>

<div class="container">

<div class="logo-card" onclick="openModal('dsi')">
<img src="logosn/logo1.jpg">
</div>

<div class="logo-card" onclick="openModal('3ds')">
<img src="logosn/logo2.jpg">
</div>

<div class="logo-card" onclick="openModal('wii')">
<img src="logosn/logo3.jpg">
</div>

</div>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<div id="modal-text"></div>
</div>
</div>

<script>
function openModal(type){

let text="";

if(type==="dsi"){
text=`<h2>Nintendo DSi Instructions</h2>

<h3>Play DSi Games</h3>

<h4>Step 1</h4>
<p>Power on your DSi and wait until the system finishes loading.</p>
<img src="stepsdsi/stepsndsi1.jpg">

<h4>Step 2</h4>
<p>Go to the <strong>roms</strong> folder.</p>
<img src="stepsdsi/stepsndsi2.jpg">

<h4>Step 3</h4>
<p>Select a game and start playing.</p>
<img src="stepsdsi/stepsndsi3.jpg">

<h4>Step 4</h4>
<p>Press the Power button once to return to the menu.</p>
<img src="stepsdsi/stepsndsi4.jpg">

<h4>Step 5</h4>
<p>Select another game.</p>
<img src="stepsdsi/stepsndsi5.jpg">

<hr>

<h3>Play GBA Games</h3>

<img src="stepsdsi/stepsndsi6.jpg">
<img src="stepsdsi/stepsndsi7.jpg">
<img src="stepsdsi/stepsndsi8.jpg">
<img src="stepsdsi/stepsndsi9.jpg">
<img src="stepsdsi/stepsndsi10.jpg">
<img src="stepsdsi/stepsndsi11.jpg">
<img src="stepsdsi/stepsndsi12.jpg">

<hr>

<h3>Play Original DS Cartridge</h3>

<img src="stepsdsi/stepsndsi13.jpg">
<img src="stepsdsi/stepsndsi14.jpg">
<img src="stepsdsi/stepsndsi15.jpg">
`;
}

if(type==="wii"){
text=`<h2>How to play games on modded Wii</h2>

<p><b>NOTE:</b> Some Nintendo Wii start with the “Configurable USB Loader” to play games from USB. In this case if your Wii start normally continue this steps.</p>

<h3>Step 1</h3>
<p>Turn on your Wii press A button to continue and start with the Home Menu:</p>
<img src="stepswii/wii1.jpg">

<p>Select the Channel “Configurable USB Loader” and press start:</p>
<img src="stepswii/wii2.jpg">

<h3>Step 2</h3>
<p>Wait until the channel is loading all games on the USB when the load is finish you see all games on the USB:</p>
<img src="stepswii/wii3.jpg">

<p>Select game you wish to play and press start button:</p>
<img src="stepswii/wii4.jpg">

<p>Enjoy your game!</p>
<img src="stepswii/wii5.jpg">

<h3>Step 4</h3>
<p>To Change game press on the Wii mote the Home Menu button:</p>
<img src="stepswii/wii6.jpg">

<p>And press “Wii Menu” and press “Yes”:</p>
<img src="stepswii/wii7.jpg">
<img src="stepswii/wii8.jpg">

<p>You will go back to the Main Menu of the Wii and repeat the Step one to load your USB games!</p>

<hr>

<p><b>NOTE:</b> If in case the “Configurable USB loader” do NOT LOAD turn off your Wii and follow this steps:</p>

<h3>Step 1</h3>
<p>Turn on your Wii and in the Wii Menu select this Homebrew Channel:</p>
<img src="stepswii/wii9.jpg">

<p>Start the channel and you will see this menu:</p>
<img src="stepswii/wii10.jpg">

<p>Select Configurable USB loader and press Load/Cargar:</p>
<img src="stepswii/wii11.jpg">

<p>And you will see all your games from the USB again!</p>
<img src="stepswii/wii12.jpg">

<hr>

<h3>WARNING</h3>

<p>Do never remove the USB or SD card from this slots:</p>
<img src="stepswii/wii13.jpg">
<img src="stepswii/wii14.jpg">

<p>USB with games always need to be in the right USB slot (Blue mark):</p>
<img src="stepswii/wii15.jpg">
`;
}

if(type==="3ds"){
text=`<h2>How to delete games and use apps on modded 2/3DS</h2>

<p>If you want make more space for download new games follow this Steps.</p>

<h3>HOW TO DELETE GAMES USING FBI APP</h3>

<h3>Step 1</h3>
<p>Turn on your 2/3DS (Works for any model) and search FBI app and press A button to start app:</p>
<img src="steps3ds/3ds1.jpg">
<img src="steps3ds/3ds2.jpg">

<h3>Step 2</h3>
<p>When the app is open you going to see your SD memory card files and search “Titles” press A:</p>
<img src="steps3ds/3ds3.jpg">

<h3>Step 3</h3>
<p>Now you going to see all the apps and games installed on your console the titles on green means those are Games now select the game you want to delete:</p>
<img src="steps3ds/3ds4.jpg">

<p>Then press A and you going to see new list options and select “Delete Title and Tick” to delete everything about that game and press Yes:</p>
<img src="steps3ds/3ds5.jpg">

<p>To exit FBI app press B button 3 times and in the main menu of FBI press Start button and bring you back to the home menu.</p>

<p><b>NOTE:</b> Every game you delete you can download again on the “HShop” app.</p>

<hr>

<h3>Internet connection Steps</h3>

<h3>Step 1</h3>
<p>Go to “System setting”:</p>
<img src="steps3ds/3ds6.jpg">

<h3>Step 2</h3>
<p>Go to “Internet settings”:</p>
<img src="steps3ds/3ds7.jpg">

<h3>Step 3</h3>
<p>Go to “Connection setting”:</p>
<img src="steps3ds/3ds8.jpg">

<p>Press “New connection” and follow Nintendo instructions:</p>
<img src="steps3ds/3ds9.jpg">

<p>And when you finish you are ready to download games!</p>

<hr>

<h3>How to use Hshop app</h3>

<p>Hshop app is for download any game available also Themes, DLC’s and many more follow this steps to get your games!</p>

<h3>Step 1</h3>
<p>Select “Hshop” and open the app:</p>
<img src="steps3ds/3ds10.jpg">

<h3>Step 2</h3>
<p>When is open you are going to see the category list select what you want to download:</p>
<img src="steps3ds/3ds11.jpg">

<h3>Step 3</h3>
<p>You can download games from any region select what you want to see the list available:</p>
<img src="steps3ds/3ds12.jpg">

<h3>Step 4</h3>
<p>Select the game you wish to play pressing A confirm and download it:</p>
<img src="steps3ds/3ds13.jpg">
<img src="steps3ds/3ds14.jpg">

<p>And just wait depending of your internet and the size of the game and when is finish its already installed on your Home Menu like a gift!</p>
<img src="steps3ds/3ds15.jpg">

<p>Opened and ready to play!</p>

<p><b>NOTE:</b> Some games are Exclusive for model “New 3DS” and if the game do not start do this:</p>

<p>Go to FBI → Title → select the game → select “Import SEED” exit FBI and that fix the game.</p>

<hr>

<h3>How to install Theme with ANEMONE</h3>

<h3>Step 1</h3>
<p>Open ANEMONE app:</p>
<img src="steps3ds/3ds16.jpg">

<h3>Step 2</h3>
<p>In your cellphone or Computer google: “Theme plaza”:</p>
<img src="steps3ds/3ds17.jpg">

<p>Select the Theme you like and you will see a QR code:</p>
<img src="steps3ds/3ds18.jpg">

<h3>Step 3</h3>
<p>Now on your 2-3DS open the Cam on ANEMONE app pressing “R” button:</p>
<img src="steps3ds/3ds19.jpg">

<p>Scan it and automatically its going to download the Theme:</p>
<img src="steps3ds/3ds20.jpg">

<p>When the download is finish select the Theme then press A and next press arrow up from the D-pad:</p>
<img src="steps3ds/3ds21.jpg">
<img src="steps3ds/3ds22.jpg">

<p>When is finish exit from ANEMONE pressing Start button and you going to see the power off option press it and turn on again the console you will see the theme installed!</p>
<img src="steps3ds/3ds23.jpg">
`;
}
document.getElementById("modal-text").innerHTML=text;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
